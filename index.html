<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pemetaan Konsumen - Ultimate Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* Desain Sistem Terang & Gelap */
        :root {
            --bg-body: #f1f5f9; --bg-card: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b;
            --border-color: #e2e8f0; --input-bg: #ffffff;
            --primary: #0f172a; --accent: #2563eb;
            --success: #16a34a; --warning: #ca8a04; --danger: #dc2626;
        }

        .dark-mode {
            --bg-body: #0f172a; --bg-card: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --border-color: #334155; --input-bg: #0f172a;
            --primary: #f8fafc;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-body); margin: 0; padding: 10px; color: var(--text-main); transition: background 0.3s; }
        .container { max-width: 650px; margin: auto; background: var(--bg-card); padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: background 0.3s; }
        
        /* Bar Status Internet */
        #networkStatus { text-align: center; padding: 8px; font-size: 12px; font-weight: bold; color: white; background: var(--success); border-radius: 8px 8px 0 0; margin: -20px -20px 15px -20px; display: none; }
        .offline-bar { background: var(--danger) !important; display: block !important; }

        .header-app { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        .header-title h2 { margin: 0; color: var(--primary); font-size: 20px; font-weight: 800; }
        .header-title p { margin: 3px 0 0 0; color: var(--text-muted); font-size: 12px; }
        
        /* Tombol Toggle Dark Mode */
        .btn-theme { background: var(--border-color); color: var(--text-main); border: none; padding: 8px 12px; border-radius: 20px; font-size: 18px; cursor: pointer; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: var(--bg-body); padding: 12px; border-radius: 10px; text-align: center; border: 1px solid var(--border-color); }
        .stat-box .title { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        .stat-box .value { font-size: 20px; font-weight: 700; color: var(--primary); margin-top: 2px; }
        
        #akurasiStatus { font-size: 13px; font-weight: 700; padding: 6px; border-radius: 6px; background: var(--bg-body); color: var(--text-main); display: inline-block; width: 100%; box-sizing: border-box; text-align: center; margin-bottom: 10px; border: 1px solid var(--border-color); }

        input, button, textarea, select { background: var(--input-bg); color: var(--text-main); padding: 12px; margin: 6px 0; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid var(--border-color); font-size: 14px; transition: 0.3s; }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        textarea { resize: vertical; height: 70px; }
        
        .flex-row { display: flex; gap: 8px; }
        .flex-row input { flex: 1; }
        .flex-row button { width: auto; background-color: #475569; }
        
        button { cursor: pointer; font-weight: bold; border: none; color: white; }
        button:active { transform: scale(0.97); }
        button.lokasi { background-color: var(--accent); font-size: 15px; }
        button.tambah { background-color: var(--warning); font-size: 16px; margin-top: 15px; color: #1e293b; padding: 15px; }
        button.export { background-color: var(--success); margin-top: 25px; font-size: 15px; }
        button.hapus-semua { background-color: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 10px; font-size: 13px; }

        .map-wrapper { position: relative; margin: 15px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); }
        #map { height: 320px; z-index: 1; }
        .center-crosshair { position: absolute; top: 50%; left: 50%; width: 36px; height: 36px; margin-top: -36px; margin-left: -18px; z-index: 1000; pointer-events: none; }

        .tabel-container { overflow-x: auto; margin-top: 15px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border-color); color: var(--text-main); }
        th { background-color: var(--bg-body); color: var(--text-muted); font-weight: 600; }
        
        .btn-table { padding: 6px 10px; font-size: 11px; margin: 2px; border-radius: 6px; width: auto; display: inline-flex; color: white; text-decoration: none; }
        .btn-rute { background-color: var(--accent); }
        .btn-wa { background-color: #25D366; color: #000; }
        .btn-hapus { background-color: var(--danger); }
        
        .badge-status { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; background: var(--border-color); }
    </style>
</head>
<body>

    <div class="container">
        <div id="networkStatus">⚠️ Anda Sedang Offline (Tidak ada koneksi internet)</div>

        <div class="header-app">
            <div class="header-title">
                <h2>SIG KONSUMEN v5</h2>
                <p>Edisi Ultimate (Pemetaan & CRM)</p>
            </div>
            <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">🌙</button>
        </div>

        <div class="dashboard-grid">
            <div class="stat-box">
                <div class="title">Total Konsumen</div>
                <div class="value" id="totalCounter">0</div>
            </div>
            <div class="stat-box">
                <div class="title">Status Akurasi GPS</div>
                <div id="akurasiStatus">Menunggu GPS...</div>
            </div>
        </div>
        
        <div class="flex-row">
            <input type="text" id="cariArea" placeholder="Ketik area untuk melompat...">
            <button onclick="cariLokasiPeta()">🔍 Cari</button>
        </div>

        <button class="lokasi" onclick="kunciGPSPerangkat()">🎯 Paksa Kunci GPS Presisi Tinggi</button>
        
        <div class="map-wrapper">
            <div id="map"></div>
            <div class="center-crosshair">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C8.13 2 5 5.13 5 9C5 14.25 12 22 12 22C12 22 19 14.25 19 9C19 5.13 15.87 2 12 2ZM12 11.5C10.62 11.5 9.5 10.38 9.5 9C9.5 7.62 10.62 6.5 12 6.5C13.38 6.5 14.5 7.62 14.5 9C14.5 10.38 13.38 11.5 12 11.5Z" fill="#dc2626" stroke="#ffffff" stroke-width="1.5"/>
                </svg>
            </div>
        </div>
        
        <div class="flex-row" style="margin-bottom: 15px;">
            <input type="text" id="latitude" placeholder="Latitude" readonly>
            <input type="text" id="longitude" placeholder="Longitude" readonly>
        </div>

        <label style="font-size: 12px; font-weight: bold; color: var(--text-muted);">Detail Konsumen:</label>
        
        <input type="text" id="namaKonsumen" placeholder="1. Nama Lengkap Konsumen / Toko *" required>
        
        <div class="flex-row">
            <input type="number" id="noWA" placeholder="2. No. WhatsApp (Misal: 0812...)">
            <select id="statusKonsumen">
                <option value="Konsumen Baru">Konsumen Baru</option>
                <option value="Pelanggan Tetap">Pelanggan Tetap</option>
                <option value="Prospek/Leads">Prospek/Leads</option>
            </select>
        </div>

        <textarea id="alamatOtomatis" placeholder="3. Alamat Lengkap (Otomatis dari Peta, bisa diedit manual)..."></textarea>
        
        <button class="tambah" onclick="simpanKeDatabase()">💾 KUNCI & SIMPAN KE DATABASE</button>

        <div style="margin-top: 35px; border-top: 2px solid var(--border-color); padding-top: 20px;">
            <h3 style="margin-top: 0;">📋 Database Lapangan</h3>
            <input type="text" id="cariDiTabel" onkeyup="filterTabelRealtime()" placeholder="🔍 Cari nama atau status konsumen...">
            
            <div class="tabel-container">
                <table>
                    <thead>
                        <tr>
                            <th>Profil Konsumen</th>
                            <th>Info Alamat & Kontak</th>
                            <th style="text-align: center;">Tindakan</th>
                        </tr>
                    </thead>
                    <tbody id="isiTabel">
                        </tbody>
                </table>
            </div>

            <button class="export" onclick="exportKeExcelXLSX()">📗 Ekspor ke File Microsoft Excel (.xlsx)</button>
            <button class="hapus-semua" onclick="kosongkanData()">🗑️ Kosongkan Database HP (Reset)</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <script>
        // 1. SISTEM DETEKSI INTERNET
        window.addEventListener('online', function() { document.getElementById('networkStatus').classList.remove('offline-bar'); });
        window.addEventListener('offline', function() { document.getElementById('networkStatus').classList.add('offline-bar'); });
        if(!navigator.onLine) { document.getElementById('networkStatus').classList.add('offline-bar'); }

        // 2. SISTEM DARK MODE
        let isDark = localStorage.getItem('themeDark') === 'true';
        if(isDark) document.body.classList.add('dark-mode');
        document.getElementById('themeBtn').innerText = isDark ? "☀️" : "🌙";
        
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            let isNowDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('themeDark', isNowDark);
            document.getElementById('themeBtn').innerText = isNowDark ? "☀️" : "🌙";
        }

        // 3. INISIALISASI PETA & DATABASE
        let databaseLokasi = JSON.parse(localStorage.getItem('dbSIG_V5')) || [];
        var map = L.map('map', { zoomControl: false }).setView([-2.548926, 118.014863], 5);
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM' }).addTo(map);
        var radiusAkurasiLingkaran; var waktuTungguAlamat;

        renderUlangSistem();

        // 4. LOGIKA PETA BERGESER (Gojek Style)
        map.on('move', function () {
            let t = map.getCenter();
            document.getElementById('latitude').value = t.lat.toFixed(7);
            document.getElementById('longitude').value = t.lng.toFixed(7);
        });

        map.on('moveend', function () {
            let t = map.getCenter();
            clearTimeout(waktuTungguAlamat);
            if(navigator.onLine) { // Hanya tarik alamat jika internet aktif
                waktuTungguAlamat = setTimeout(() => lacakAlamatReverseGeocode(t.lat, t.lng), 800);
            }
        });

        function lacakAlamatReverseGeocode(lat, lng) {
            document.getElementById('alamatOtomatis').value = "⏳ Melacak satelit...";
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('alamatOtomatis').value = data.display_name || "";
                }).catch(() => { document.getElementById('alamatOtomatis').value = "Ketik alamat manual..."; });
        }

        function kunciGPSPerangkat() {
            let badge = document.getElementById('akurasiStatus');
            badge.innerText = "⏳ Mencari Satelit...";
            badge.style.background = "var(--border-color)";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        let lat = pos.coords.latitude;
                        let lon = pos.coords.longitude;
                        let akurasi = pos.coords.accuracy; 

                        badge.innerText = `🎯 Akurasi: ${akurasi.toFixed(1)} Meter`;
                        badge.style.background = akurasi <= 12 ? "var(--success)" : (akurasi <= 35 ? "var(--warning)" : "var(--danger)");
                        badge.style.color = akurasi <= 12 ? "white" : (akurasi <= 35 ? "#000" : "white");

                        map.setView([lat, lon], 18);
                        if(radiusAkurasiLingkaran) { map.removeLayer(radiusAkurasiLingkaran); }
                        radiusAkurasiLingkaran = L.circle([lat, lon], { radius: akurasi, color: '#2563eb', fillColor: '#3b82f6', fillOpacity: 0.2 }).addTo(map);
                    },
                    function() { alert("Gagal mengunci GPS. Pastikan Izin Lokasi aktif!"); badge.innerText = "❌ GPS Gagal"; },
                    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
                );
            }
        }

        function cariLokasiPeta() {
            let area = document.getElementById('cariArea').value;
            if(!area) return;
            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${area}`)
                .then(res => res.json())
                .then(data => { if(data.length > 0) map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 16); });
        }

        // FORMAT NOMOR WA OTOMATIS
        function formatWA(nomor) {
            if(!nomor) return "";
            nomor = nomor.replace(/\D/g,''); // Buang spasi/karakter selain angka
            if(nomor.startsWith('0')) { nomor = '62' + nomor.substring(1); } // Ubah 0 jadi 62
            return nomor;
        }

        function simpanKeDatabase() {
            let nama = document.getElementById('namaKonsumen').value;
            let lat = document.getElementById('latitude').value;
            let lon = document.getElementById('longitude').value;
            let alamat = document.getElementById('alamatOtomatis').value;
            let noWARaw = document.getElementById('noWA').value;
            let statusKon = document.getElementById('statusKonsumen').value;

            if(!nama || !lat || !lon) return alert("Nama dan Titik Peta Wajib Ada!");

            databaseLokasi.push({ 
                nama: nama, lat: lat, lon: lon, 
                alamat: alamat, noWA: formatWA(noWARaw), status: statusKon 
            });
            
            localStorage.setItem('dbSIG_V5', JSON.stringify(databaseLokasi));
            
            // Reset Sebagian Field
            document.getElementById('namaKonsumen').value = "";
            document.getElementById('noWA').value = "";
            renderUlangSistem();
        }

        function renderUlangSistem() {
            let tbody = document.getElementById('isiTabel');
            tbody.innerHTML = "";
            document.getElementById('totalCounter').innerText = databaseLokasi.length;

            databaseLokasi.forEach((item, idx) => {
                let linkWA = item.noWA ? `https://wa.me/${item.noWA}` : '#';
                let tombolWA = item.noWA ? `<a href="${linkWA}" target="_blank" class="btn-table btn-wa">💬 WA</a>` : '';

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <strong>${item.nama}</strong><br>
                        <span class="badge-status">${item.status}</span>
                    </td>
                    <td>
                        <div style="font-size:11px; max-height:40px; overflow-y:auto; margin-bottom:5px;">${item.alamat || '-'}</div>
                        <span style="font-family:monospace; font-size:10px; color:var(--accent);">${item.lat}, ${item.lon}</span>
                    </td>
                    <td style="text-align:center; min-width:90px;">
                        ${tombolWA}
                        <button class="btn-table btn-rute" onclick="window.open('https://www.google.com/maps/dir/?api=1&destination=$${item.lat},${item.lon}')">🧭 Peta</button>
                        <button class="btn-table btn-hapus" onclick="hapusSatuData(${idx})">🗑️</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function filterTabelRealtime() {
            let filter = document.getElementById("cariDiTabel").value.toLowerCase();
            let rows = document.getElementById("isiTabel").getElementsByTagName("tr");
            for (let i = 0; i < rows.length; i++) {
                let txtValue = rows[i].textContent || rows[i].innerText;
                rows[i].style.display = txtValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
            }
        }

        function hapusSatuData(idx) {
            if(confirm("Hapus data konsumen ini?")) {
                databaseLokasi.splice(idx, 1);
                localStorage.setItem('dbSIG_V5', JSON.stringify(databaseLokasi));
                renderUlangSistem();
            }
        }

        function kosongkanData() {
            if(confirm("HAPUS SEMUA DATA? Pastikan Anda sudah Export ke Excel!")) {
                databaseLokasi = [];
                localStorage.removeItem('dbSIG_V5');
                renderUlangSistem();
            }
        }

        function exportKeExcelXLSX() {
            if(databaseLokasi.length === 0) return alert("Belum ada data!");
            
            let formatExcel = databaseLokasi.map((item, index) => ({
                "No": index + 1,
                "Nama Konsumen": item.nama,
                "Kategori Status": item.status,
                "Nomor WhatsApp": item.noWA ? `+${item.noWA}` : "-",
                "Alamat Lapangan": item.alamat,
                "Latitude": parseFloat(item.lat),
                "Longitude": parseFloat(item.lon),
                "Link Direct WhatsApp": item.noWA ? `https://wa.me/${item.noWA}` : "-",
                "Link Google Maps": `https://www.google.com/maps/search/?api=1&query=$${item.lat},${item.lon}`
            }));

            let ws = XLSX.utils.json_to_sheet(formatExcel);
            let wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Database Konsumen");

            ws['!cols'] = [{wch: 4}, {wch: 25}, {wch: 15}, {wch: 18}, {wch: 45}, {wch: 15}, {wch: 15}, {wch: 30}, {wch: 35}];

            let h = new Date().toISOString().slice(0,10);
            XLSX.writeFile(wb, `Database_Konsumen_V5_${h}.xlsx`);
        }
    </script>
</body>
</html>
